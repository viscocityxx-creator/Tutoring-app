<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="container">
    <a class="back" th:href="@{/}">Home</a>
    <h1>Sessions</h1>

    <div th:if="${success}" class="alert success" th:text="${success}"></div>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>

    <section class="panel">
        <h2>Book Session</h2>
        <form method="post" th:action="@{/sessions}" th:object="${bookForm}" class="grid">
            <select th:field="*{tutorId}" required>
                <option value="">Select Tutor</option>
                <option th:each="tutor : ${tutors}" th:value="${tutor.id}"
                        th:text="${tutor.name + ' - ' + tutor.subjects}"></option>
            </select>
            <select th:field="*{studentId}" required>
                <option value="">Select Student</option>
                <option th:each="student : ${students}" th:value="${student.id}"
                        th:text="${student.name}"></option>
            </select>
            <select th:field="*{subject}" required>
                <option value="">Select Subject</option>
                <option th:each="subject : ${subjects}" th:value="${subject}" th:text="${subject}"></option>
            </select>
            <input th:field="*{startsAt}" type="datetime-local" required>
            <input th:field="*{durationMinutes}" type="number" placeholder="Duration (minutes)" required>
            <input th:field="*{notes}" placeholder="Notes">
            <button type="submit">Book</button>
        </form>
    </section>

    <section class="panel">
        <h2>All Sessions</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Tutor</th>
                <th>Student</th>
                <th>Subject</th>
                <th>Start</th>
                <th>Duration</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${sessions}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.tutor.name}"></td>
                <td th:text="${s.student.name}"></td>
                <td th:text="${s.subject}"></td>
                <td th:text="${s.startsAt}"></td>
                <td th:text="${s.durationMinutes + ' min'}"></td>
                <td th:text="${s.status}"></td>
                <td>
                    <form th:if="${s.status.name() == 'SCHEDULED'}" method="post" th:action="@{'/sessions/' + ${s.id} + '/cancel'}">
                        <button type="submit">Cancel</button>
                    </form>
                    <span th:if="${s.status.name() != 'SCHEDULED'}">-</span>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
