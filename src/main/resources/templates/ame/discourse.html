<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discourse - AME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/ame.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <div class="brand">Discourse</div>
            <div class="tiny muted">Community-style reflection from delivered assignments.</div>
        </div>
        <a class="btn ghost" th:href="@{/history}">Back to history</a>
    </header>
    <section class="progress">
        <div class="step done"><strong>1.</strong> Upload</div>
        <div class="step done"><strong>2.</strong> Analyze</div>
        <div class="step done"><strong>3.</strong> Pay</div>
        <div class="step active"><strong>4.</strong> Deliver</div>
    </section>

    <section class="panel" th:if="${#lists.isEmpty(reviewed)}">
        <div class="empty">
            <h2>No reviews yet</h2>
            <p class="muted tiny">After delivery, submit optional feedback from your History page.</p>
        </div>
    </section>

    <section class="panel" th:if="${!#lists.isEmpty(reviewed)}">
        <h2>Recent experience posts</h2>
        <div th:each="post : ${reviewed}" class="panel">
            <h3 th:text="${post.subject}"></h3>
            <p class="tiny muted" th:text="${'Rating: ' + post.rating + '/5'}"></p>
            <p th:text="${post.review}"></p>
        </div>
    </section>
</main>
</body>
</html>
