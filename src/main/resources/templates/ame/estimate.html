<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Review Complete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/ame.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <div class="brand">Assignment Review Complete</div>
        </div>
        <div class="actions">
            <a class="btn ghost" th:href="@{/upload}">Back</a>
            <a class="btn ghost" th:href="@{/history}">History</a>
            <form th:action="@{/auth/logout}" method="post">
                <button class="ghost" type="submit">Logout</button>
            </form>
        </div>
    </header>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>
    <section class="progress">
        <div class="step done"><strong>1.</strong> Upload</div>
        <div class="step active"><strong>2.</strong> Analyze</div>
        <div class="step"><strong>3.</strong> Pay</div>
        <div class="step"><strong>4.</strong> Deliver</div>
    </section>

    <section class="panel">
        <h2>Review Snapshot</h2>
        <div class="grid-2">
            <div>
                <div class="tiny muted">Category</div>
                <div th:text="${quote.finalCategory}"></div>
            </div>
            <div>
                <div class="tiny muted">Delivery</div>
                <div th:text="${quote.predictedHours + ' hours'}"></div>
            </div>
            <div>
                <div class="tiny muted">Currency</div>
                <div th:text="${quote.country.currencyCode}"></div>
            </div>
        </div>
    </section>

    <section class="panel">
        <h2>Confirm timeframe and calculate final cost</h2>
        <form th:action="@{/quote/confirm}" method="post" class="grid-2">
            <label>
                Choose delivery time
                <select name="requestedHours">
                    <option value="">Use AI predicted time</option>
                    <option th:each="opt : ${deliveryOptions}" th:value="${opt.key}" th:text="${opt.value}"
                            th:selected="${opt.key == quote.predictedHours}"></option>
                </select>
            </label>
            <button type="submit">Continue to Payment</button>
        </form>
    </section>
</main>
</body>
</html>
