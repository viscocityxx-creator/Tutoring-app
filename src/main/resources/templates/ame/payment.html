<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - AME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/ame.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <div class="brand">Payment & Delivery Setup</div>
        </div>
        <div class="actions">
            <a class="btn ghost" th:href="@{/history}">History</a>
            <form th:action="@{/auth/logout}" method="post">
                <button class="ghost" type="submit">Logout</button>
            </form>
        </div>
    </header>
    <section class="progress">
        <div class="step done"><strong>1.</strong> Upload</div>
        <div class="step done"><strong>2.</strong> Analyze</div>
        <div class="step active"><strong>3.</strong> Pay</div>
        <div class="step"><strong>4.</strong> Deliver</div>
    </section>

    <section class="panel">
        <h2>Submission #<span th:text="${submission.id}"></span></h2>
        <div class="grid-3">
            <div>
                <div class="tiny muted">Country</div>
                <div th:text="${submission.country}"></div>
            </div>
            <div>
                <div class="tiny muted">Expected delivery</div>
                <div th:text="${submission.requiredHours + ' hours'}"></div>
            </div>
            <div>
                <div class="tiny muted">Base total (NGN)</div>
                <div th:text="${'NGN ' + submission.totalNgn}"></div>
            </div>
            <div>
                <div class="tiny muted">Local estimate</div>
                <div th:text="${submission.currencyCode + ' ' + submission.totalLocal}"></div>
            </div>
            <div>
                <div class="tiny muted">USD</div>
                <div th:text="'$' + ${submission.totalUsd}"></div>
            </div>
        </div>
    </section>

    <section class="panel">
        <h3>Stripe setup links</h3>
        <p><a href="https://stripe.com/docs/payments/accept-a-payment?platform=web" target="_blank" rel="noopener">Stripe: Accept a payment on web</a></p>
        <p><a href="https://dashboard.stripe.com/register" target="_blank" rel="noopener">Create Stripe account</a></p>
    </section>

    <section class="panel">
        <h3>Demo payment</h3>
        <form th:action="@{'/payment/' + ${submission.id} + '/complete'}" method="post">
            <button type="submit">I have paid - Start Work</button>
        </form>
    </section>
</main>
</body>
</html>
