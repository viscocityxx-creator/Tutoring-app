<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Step 1 - AME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/ame.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <div class="brand">AME Upload Workspace</div>
        </div>
        <div class="actions">
            <a class="btn ghost" th:href="@{/}">Home</a>
            <a class="btn ghost" th:href="@{/how-it-works}">How It Works</a>
            <a class="btn ghost" th:href="@{/history}">History</a>
            <form th:action="@{/auth/logout}" method="post">
                <button class="ghost" type="submit">Logout</button>
            </form>
        </div>
    </header>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <section class="progress">
        <div class="step active"><strong>1.</strong> Profile</div>
        <div class="step"><strong>2.</strong> Content</div>
        <div class="step"><strong>3.</strong> Analyze</div>
        <div class="step"><strong>4.</strong> Pay & Deliver</div>
    </section>

    <section class="panel">
        <h1>Assignment profile</h1>
        <form th:action="@{/upload/start}" method="post">
            <input type="hidden" name="draftId" th:value="${draftId}">
            <input type="hidden" name="userTimezone" id="userTimezone">
            <div class="grid-3">
                <label>
                    Country
                    <select name="country" id="countrySelect" required>
                        <option value="">Select country</option>
                        <option th:each="country : ${countries}" th:value="${country.name}" th:text="${country.name + ' (' + country.currencyCode + ')'}"></option>
                    </select>
                </label>
                <label>
                    Category
                    <select name="category" required>
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                    </select>
                </label>
                <label>
                    Academic level
                    <select name="academicLevel" required>
                        <option th:each="level : ${levels}" th:value="${level}" th:text="${level}"></option>
                    </select>
                </label>
            </div>
            <div style="margin:0.7rem 0;">
                <button class="ghost" type="button" id="detectBtn">Use my current country/timezone</button>
            </div>
            <label>
                Subject
                <input name="subject" placeholder="e.g. Organic Chemistry, Public Policy Analysis" required>
            </label>
            <button type="submit">Continue to Step 2</button>
        </form>
    </section>
</main>
<script>
  document.getElementById("userTimezone").value = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById("detectBtn").addEventListener("click", () => {
    const region = new Intl.Locale(navigator.language).region;
    const map = {
      NG: "Nigeria", GH: "Ghana", BJ: "Benin", BF: "Burkina Faso", CV: "Cape Verde",
      CI: "Cote d'Ivoire", GM: "Gambia", GN: "Guinea", GW: "Guinea-Bissau", LR: "Liberia",
      ML: "Mali", NE: "Niger", SN: "Senegal", SL: "Sierra Leone", TG: "Togo",
      KE: "Kenya", UG: "Uganda", TZ: "Tanzania", ET: "Ethiopia", ZA: "South Africa"
    };
    const countrySelect = document.getElementById("countrySelect");
    if (region && map[region]) countrySelect.value = map[region];
  });
</script>
</body>
</html>
